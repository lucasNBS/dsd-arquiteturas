version: '3.9'

services:
  
  app:
    build: .

    container_name: monolito-modular

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/modular
      PORT: 3000

    depends_on:
      - postgres

    restart: unless-stopped

  postgres:
    image: postgres:16

    container_name: postgres-modular

    environment:
      POSTGRES_DB: modular
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: unless-stopped

volumes:
  postgres_data: